name: Postman Newman Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  test-and-report:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Dependencies
        run: npm install

      - name: Run Postman Tests
        continue-on-error: true
        run: |
          mkdir -p reports images
          curl -L https://upload.wikimedia.org/wikipedia/commons/4/4d/Dog_pose.jpg -o images/test-dog.jpg
          npx newman run AQA-TS-lection13-TheDogsApi_v2.postman_collection.json -r htmlextra --reporter-htmlextra-export reports/index.html

      - name: Deploy to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./reports

      - name: Output Report Link
        if: always()
        run: |
          echo "### Newman Test Report 🚀" >> $GITHUB_STEP_SUMMARY
          echo "Your report is available here: [https://Lekuro.github.io/Postman-newman-ghActions/](https://Lekuro.github.io/Postman-newman-ghActions/)" >> $GITHUB_STEP_SUMMARY
